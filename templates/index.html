<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Inventory Optimizer Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="navbar">
        <h1>AI Supply Chain Inventory Optimizer</h1>
    </div>

    <!-- INPUT FORM -->
    <div class="form-box">
        <form method="POST" action="/check">
            <input type="number" name="stock" placeholder="Enter Current Stock" required>
            <button type="submit">Check Inventory</button>
        </form>
    </div>

    <!-- DASHBOARD -->
    <div class="container">

        <div class="card blue">
            <h3>Predicted Demand</h3>
            <p>{{ demand }}</p>
        </div>

        <div class="card dark">
            <h3>Current Stock</h3>
            <p>{{ stock }}</p>
        </div>

        <div class="card red">
            <h3>Reorder Status</h3>
            <p>{{ reorder }}</p>
        </div>

    </div>

    <div class="footer">
        <p>AI-Based Inventory Optimization System</p>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
